name: Bug report
description: Report a reproducible problem with VDJ Companion
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, cookies, private URLs, or personal data.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: VDJ Companion version, VirtualDJ version, and Windows version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant sanitized logs
      description: Remove usernames, local paths, private URLs, and other personal data.
