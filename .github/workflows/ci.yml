name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -q
      - name: Build native plugin
        shell: pwsh
        run: ./plugin/online-source/build-and-install.ps1 -BuildOnly
