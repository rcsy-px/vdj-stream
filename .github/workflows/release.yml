name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches project version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $projectVersion = (Get-Content VERSION -Raw).Trim()
          if ($tagVersion -ne $projectVersion) {
            throw "Tag version $tagVersion does not match VERSION file $projectVersion."
          }
      - name: Build native plugin
        shell: pwsh
        run: ./plugin/online-source/build-and-install.ps1 -BuildOnly
      - name: Build sanitized release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          ./scripts/build-release.ps1 -Version $version
      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/*.zip dist/*.sha256 --generate-notes
